<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ходячий Телевизор Сёма</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            border: 3px solid #e94560;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(26, 26, 46, 0.95);
            color: #fff;
            z-index: 10;
        }
        #startScreen h1 {
            font-size: 48px;
            color: #e94560;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.8);
        }
        #startScreen p {
            font-size: 20px;
            margin-bottom: 30px;
            color: #aaa;
        }
        .btn {
            padding: 15px 40px;
            font-size: 24px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #ff6b81;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.6);
        }
        #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(26, 26, 46, 0.95);
            color: #fff;
            z-index: 10;
        }
        #gameOver h2 {
            font-size: 42px;
            color: #e94560;
            margin-bottom: 20px;
        }
        #gameOver p {
            font-size: 24px;
            margin-bottom: 30px;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 14px;
        }
        #mobileControls {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 0 20px;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 5;
            pointer-events: none;
        }
        .mobile-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(233, 69, 96, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            font-size: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .mobile-btn:active {
            background: rgba(233, 69, 96, 0.9);
            transform: scale(0.95);
        }
        .mobile-dpad {
            display: flex;
            gap: 10px;
        }
        .mobile-actions {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }
        .mobile-btn.jump {
            width: 90px;
            height: 90px;
            font-size: 20px;
        }
        @media (max-width: 900px) {
            #mobileControls {
                display: flex;
            }
            #controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="ui">
            <div>Каналы: <span id="score">0</span></div>
            <div>Жизни: <span id="lives">3</span></div>
        </div>
        <div id="startScreen">
            <h1>📺 Ходячий Телевизор Сёма</h1>
            <p>Собирай каналы и избегай помех!</p>
            <button class="btn" onclick="startGame()">Играть</button>
        </div>
        <div id="gameOver">
            <h2>Игра Окончена!</h2>
            <p>Собрано каналов: <span id="finalScore">0</span></p>
            <button class="btn" onclick="startGame()">Заново</button>
        </div>
        <div id="controls">Управление: СТРЕЛКИ / WASD | Прыжок: ПРОБЕЛ</div>
        <div id="mobileControls">
            <div class="mobile-dpad">
                <button class="mobile-btn" id="btnLeft">◀</button>
                <button class="mobile-btn" id="btnRight">▶</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const finalScoreEl = document.getElementById('finalScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOver');

        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let animationFrame;
        let keys = {};

        const GRAVITY = 0.6;
        const FRICTION = 0.8;
        const GROUND_Y = 420;

        const player = {
            x: 100,
            y: 300,
            width: 60,
            height: 50,
            velX: 0,
            velY: 0,
            speed: 5,
            jumpPower: -12,
            grounded: false,
            facing: 1,
            walkFrame: 0,
            walkTimer: 0,
            channel: 1,
            channelTimer: 0,
            invincible: 0
        };

        let channels = [];
        let obstacles = [];
        let particles = [];
        let clouds = [];
        let frameCount = 0;

        const channelsList = [
            'Новости', 'Кино', 'Спорт', 'Музыка', 'Мультики',
            'Кулинария', 'Путешествия', 'Наука', 'Юмор', 'Документальный'
        ];

        const channelColors = [
            '#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6b9d',
            '#c084fc', '#fb923c', '#22d3ee', '#a3e635', '#f472b6'
        ];

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        function setupMobileButton(id, keyCode) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys[keyCode] = true;
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[keyCode] = false;
            });
            btn.addEventListener('touchcancel', (e) => {
                e.preventDefault();
                keys[keyCode] = false;
            });
        }

        setupMobileButton('btnLeft', 'ArrowLeft');
        setupMobileButton('btnRight', 'ArrowRight');

        canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        canvas.addEventListener('touchstart', (e) => {
            if (gameRunning && player.grounded) {
                player.velY = player.jumpPower;
                player.grounded = false;
            }
        }, { passive: true });

        function startGame() {
            score = 0;
            lives = 3;
            player.x = 100;
            player.y = 300;
            player.velX = 0;
            player.velY = 0;
            player.invincible = 0;
            channels = [];
            obstacles = [];
            particles = [];
            frameCount = 0;

            scoreEl.textContent = score;
            livesEl.textContent = lives;

            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';

            if (!gameRunning) {
                gameRunning = true;
                gameLoop();
            }
        }

        function spawnChannel() {
            const type = Math.floor(Math.random() * channelsList.length);
            channels.push({
                x: 800 + Math.random() * 200,
                y: 200 + Math.random() * 180,
                width: 35,
                height: 30,
                type: type,
                collected: false,
                bobOffset: Math.random() * Math.PI * 2
            });
        }

        function spawnObstacle() {
            const type = Math.random();
            if (type < 0.5) {
                obstacles.push({
                    x: 800,
                    y: GROUND_Y - 40,
                    width: 40,
                    height: 40,
                    type: 'static'
                });
            } else {
                obstacles.push({
                    x: 800,
                    y: 150 + Math.random() * 150,
                    width: 50,
                    height: 30,
                    type: 'flying',
                    bobOffset: Math.random() * Math.PI * 2
                });
            }
        }

        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    velX: (Math.random() - 0.5) * 8,
                    velY: (Math.random() - 0.5) * 8,
                    life: 30 + Math.random() * 20,
                    color: color,
                    size: 3 + Math.random() * 4
                });
            }
        }

        function drawTV(x, y, w, h, facing, walkFrame, channel, invincible) {
            ctx.save();
            ctx.translate(x + w/2, y + h/2);
            if (facing === -1) ctx.scale(-1, 1);

            if (invincible > 0 && Math.floor(invincible / 3) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }

            const legAngle = Math.sin(walkFrame * 0.3) * 0.4;

            ctx.fillStyle = '#444';
            ctx.beginPath();
            ctx.moveTo(-8, h/2 - 5);
            ctx.lineTo(-12 + Math.sin(legAngle) * 5, h/2 + 15);
            ctx.lineTo(-6 + Math.sin(legAngle) * 5, h/2 + 15);
            ctx.lineTo(-2, h/2 - 5);
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(2, h/2 - 5);
            ctx.lineTo(-2 - Math.sin(legAngle) * 5, h/2 + 15);
            ctx.lineTo(4 - Math.sin(legAngle) * 5, h/2 + 15);
            ctx.lineTo(8, h/2 - 5);
            ctx.fill();

            ctx.fillStyle = '#555';
            ctx.fillRect(-w/2 - 3, -h/2 - 3, w + 6, h + 6);

            ctx.fillStyle = '#333';
            ctx.fillRect(-w/2, -h/2, w, h);

            const screenColor = channelColors[channel % channelColors.length];
            ctx.fillStyle = screenColor;
            ctx.fillRect(-w/2 + 5, -h/2 + 5, w - 10, h - 15);

            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fillRect(-w/2 + 5, -h/2 + 5, (w - 10) / 2, h - 15);

            ctx.fillStyle = '#666';
            ctx.beginPath();
            ctx.arc(w/2 - 8, -h/2 + 12, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(w/2 - 8, -h/2 + 22, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#777';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-w/2 + 2, -h/2 - 10);
            ctx.lineTo(-w/2 + 12, -h/2 - 25);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(w/2 - 2, -h/2 - 10);
            ctx.lineTo(w/2 - 12, -h/2 - 25);
            ctx.stroke();

            ctx.fillStyle = '#888';
            ctx.beginPath();
            ctx.arc(-w/2 + 12, -h/2 - 25, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(w/2 - 12, -h/2 - 25, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#222';
            ctx.fillRect(-w/2 + 8, h/2 - 8, w - 16, 5);

            ctx.restore();
        }

        function drawChannel(channel) {
            const bob = Math.sin(frameCount * 0.05 + channel.bobOffset) * 8;
            const x = channel.x;
            const y = channel.y + bob;

            ctx.fillStyle = channelColors[channel.type];
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.arc(x + channel.width/2, y + channel.height/2, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;

            ctx.fillStyle = '#fff';
            ctx.fillRect(x, y, channel.width, channel.height);
            ctx.fillStyle = channelColors[channel.type];
            ctx.fillRect(x + 3, y + 3, channel.width - 6, channel.height - 10);
            ctx.fillStyle = '#fff';
            ctx.font = '10px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText(channelsList[channel.type], x + channel.width/2, y + channel.height - 2);
        }

        function drawObstacle(obstacle) {
            if (obstacle.type === 'static') {
                ctx.fillStyle = '#ff4444';
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);

                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(obstacle.x + 8, obstacle.y + 8);
                ctx.lineTo(obstacle.x + obstacle.width - 8, obstacle.y + obstacle.height - 8);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(obstacle.x + obstacle.width - 8, obstacle.y + 8);
                ctx.lineTo(obstacle.x + 8, obstacle.y + obstacle.height - 8);
                ctx.stroke();

                for (let i = 0; i < 3; i++) {
                    const lineY = obstacle.y + 8 + i * 12;
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.beginPath();
                    ctx.moveTo(obstacle.x, lineY);
                    ctx.lineTo(obstacle.x + obstacle.width, lineY);
                    ctx.stroke();
                }
            } else {
                const bob = Math.sin(frameCount * 0.08 + obstacle.bobOffset) * 5;
                const y = obstacle.y + bob;

                ctx.fillStyle = '#ff8800';
                for (let i = 0; i < 5; i++) {
                    const angle = (frameCount * 0.1) + (i * Math.PI * 2 / 5);
                    const px = obstacle.x + obstacle.width/2 + Math.cos(angle) * 20;
                    const py = y + obstacle.height/2 + Math.sin(angle) * 15;
                    ctx.beginPath();
                    ctx.arc(px, py, 5, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.fillStyle = 'rgba(255, 136, 0, 0.3)';
                ctx.beginPath();
                ctx.arc(obstacle.x + obstacle.width/2, y + obstacle.height/2, 25, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, 500);
            gradient.addColorStop(0, '#0f0c29');
            gradient.addColorStop(0.5, '#302b63');
            gradient.addColorStop(1, '#24243e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 800, 500);

            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const x = (i * 137 + frameCount * 0.1) % 800;
                const y = (i * 97) % 300;
                const size = (i % 3) + 1;
                ctx.globalAlpha = 0.5 + Math.sin(frameCount * 0.02 + i) * 0.3;
                ctx.fillRect(x, y, size, size);
            }
            ctx.globalAlpha = 1;

            ctx.fillStyle = '#1a1a3e';
            ctx.fillRect(0, GROUND_Y + 30, 800, 70);

            ctx.fillStyle = '#252550';
            for (let i = 0; i < 800; i += 40) {
                ctx.fillRect(i, GROUND_Y + 30, 20, 5);
            }

            ctx.fillStyle = '#2a2a55';
            ctx.fillRect(0, GROUND_Y + 30, 800, 3);
        }

        function checkCollision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        function update() {
            frameCount++;

            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.velX = -player.speed;
                player.facing = -1;
            }
            if (keys['ArrowRight'] || keys['KeyD']) {
                player.velX = player.speed;
                player.facing = 1;
            }
            if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.grounded) {
                player.velY = player.jumpPower;
                player.grounded = false;
            }

            player.velY += GRAVITY;
            player.x += player.velX;
            player.y += player.velY;
            player.velX *= FRICTION;

            if (player.y + player.height >= GROUND_Y) {
                player.y = GROUND_Y - player.height;
                player.velY = 0;
                player.grounded = true;
            }

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > 800) player.x = 800 - player.width;

            if (Math.abs(player.velX) > 0.5) {
                player.walkTimer++;
                if (player.walkTimer > 5) {
                    player.walkFrame++;
                    player.walkTimer = 0;
                }
            } else {
                player.walkFrame = 0;
            }

            player.channelTimer++;
            if (player.channelTimer > 120) {
                player.channel = (player.channel + 1) % channelsList.length;
                player.channelTimer = 0;
            }

            if (player.invincible > 0) player.invincible--;

            if (frameCount % 90 === 0) spawnChannel();
            if (frameCount % 120 === 0) spawnObstacle();

            channels.forEach(ch => ch.x -= 2);
            obstacles.forEach(obs => obs.x -= 3);

            channels = channels.filter(ch => ch.x > -50);
            obstacles = obstacles.filter(obs => obs.x > -50);

            channels.forEach((ch, index) => {
                if (!ch.collected && checkCollision(player, ch)) {
                    ch.collected = true;
                    score += 10;
                    scoreEl.textContent = score;
                    player.channel = ch.type;
                    player.channelTimer = 0;
                    createParticles(ch.x + ch.width/2, ch.y + ch.height/2, channelColors[ch.type], 15);
                }
            });
            channels = channels.filter(ch => !ch.collected);

            if (player.invincible <= 0) {
                obstacles.forEach(obs => {
                    if (checkCollision(player, obs)) {
                        lives--;
                        livesEl.textContent = lives;
                        player.invincible = 90;
                        createParticles(player.x + player.width/2, player.y + player.height/2, '#ff4444', 20);

                        if (lives <= 0) {
                            gameRunning = false;
                            finalScoreEl.textContent = score;
                            gameOverScreen.style.display = 'flex';
                        }
                    }
                });
            }

            particles.forEach(p => {
                p.x += p.velX;
                p.y += p.velY;
                p.life--;
                p.velY += 0.1;
            });
            particles = particles.filter(p => p.life > 0);
        }

        function draw() {
            drawBackground();

            channels.forEach(drawChannel);
            obstacles.forEach(drawObstacle);

            drawTV(player.x, player.y, player.width, player.height, 
                   player.facing, player.walkFrame, player.channel, player.invincible);

            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 50;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1;

            ctx.fillStyle = '#fff';
            ctx.font = '14px Courier New';
            ctx.textAlign = 'right';
            ctx.fillText(`Канал: ${channelsList[player.channel]}`, 790, 30);
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            animationFrame = requestAnimationFrame(gameLoop);
        }

        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, 800, 500);
    </script>
</body>
</html>
